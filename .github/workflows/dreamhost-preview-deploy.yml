name: DreamHost Preview Deploy

on:
  workflow_dispatch:
    inputs:
      confirm_preview_deploy:
        description: "Type DEPLOY_PREVIEW to deploy the protected DreamHost preview path"
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - .github/workflows/dreamhost-preview-deploy.yml
      - .github/dreamhost-preview-deploy-request.txt
      - scripts/dreamhost-preview-deploy-remote.sh

permissions:
  contents: read

env:
  LIVE_ROOT: /home/dfw_webadmin/preview.dfwmatchdayconcierge.com
  STAGING_ROOT: /home/dfw_webadmin/staging.dfwmatchdayconcierge.com
  PREVIEW_PATH: preview

jobs:
  deploy-preview:
    name: Deploy protected DreamHost preview
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Require deployment authorization
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            test "${{ github.event.inputs.confirm_preview_deploy }}" = "DEPLOY_PREVIEW"
          else
            test -f .github/dreamhost-preview-deploy-request.txt
            request_token="$(tr -d '[:space:]' < .github/dreamhost-preview-deploy-request.txt)"
            test "$request_token" = "DEPLOY_PREVIEW"
          fi

      - name: Validate existing DreamHost secrets
        shell: bash
        env:
          DREAMHOST_HOST: ${{ secrets.DREAMHOST_HOST }}
          DREAMHOST_PORT: ${{ secrets.DREAMHOST_PORT }}
          DREAMHOST_USER: ${{ secrets.DREAMHOST_USER }}
          DREAMHOST_SSH_KEY: ${{ secrets.DREAMHOST_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$DREAMHOST_HOST"
          test -n "$DREAMHOST_PORT"
          test -n "$DREAMHOST_USER"
          test -n "$DREAMHOST_SSH_KEY"

      - name: Configure SSH
        shell: bash
        env:
          DREAMHOST_SSH_KEY: ${{ secrets.DREAMHOST_SSH_KEY }}
          DREAMHOST_HOST: ${{ secrets.DREAMHOST_HOST }}
          DREAMHOST_PORT: ${{ secrets.DREAMHOST_PORT }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DREAMHOST_SSH_KEY" > ~/.ssh/dreamhost_preview_key
          chmod 600 ~/.ssh/dreamhost_preview_key
          ssh-keyscan -p "$DREAMHOST_PORT" "$DREAMHOST_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload and execute DreamHost staging-to-preview deploy script
        shell: bash
        env:
          DREAMHOST_HOST: ${{ secrets.DREAMHOST_HOST }}
          DREAMHOST_PORT: ${{ secrets.DREAMHOST_PORT }}
          DREAMHOST_USER: ${{ secrets.DREAMHOST_USER }}
          PREVIEW_AUTH_USER: ${{ secrets.DFW_PREVIEW_BASIC_AUTH_USER }}
          PREVIEW_AUTH_PASS: ${{ secrets.DFW_PREVIEW_BASIC_AUTH_PASS }}
        run: |
          set -euo pipefail
          if [ -z "${PREVIEW_AUTH_USER:-}" ]; then PREVIEW_AUTH_USER="dfwreview"; fi
          if [ -z "${PREVIEW_AUTH_PASS:-}" ]; then PREVIEW_AUTH_PASS="dfwpreview2026"; fi

          auth_user_b64="$(printf '%s' "$PREVIEW_AUTH_USER" | base64 -w0)"
          auth_pass_b64="$(printf '%s' "$PREVIEW_AUTH_PASS" | base64 -w0)"

          scp -i ~/.ssh/dreamhost_preview_key \
            -P "$DREAMHOST_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            scripts/dreamhost-preview-deploy-remote.sh \
            "$DREAMHOST_USER@$DREAMHOST_HOST:/tmp/dfw-preview-deploy.sh"

          ssh -i ~/.ssh/dreamhost_preview_key \
            -p "$DREAMHOST_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$DREAMHOST_USER@$DREAMHOST_HOST" \
            "DFW_PREVIEW_BASIC_AUTH_USER_B64='$auth_user_b64' DFW_PREVIEW_BASIC_AUTH_PASS_B64='$auth_pass_b64' LIVE_ROOT='$LIVE_ROOT' STAGING_ROOT='$STAGING_ROOT' PREVIEW_PATH='$PREVIEW_PATH' bash /tmp/dfw-preview-deploy.sh"

      - name: Validate DreamHost preview HTTP responses
        shell: bash
        env:
          PREVIEW_AUTH_USER: ${{ secrets.DFW_PREVIEW_BASIC_AUTH_USER }}
          PREVIEW_AUTH_PASS: ${{ secrets.DFW_PREVIEW_BASIC_AUTH_PASS }}
        run: |
          set -euo pipefail
          if [ -z "${PREVIEW_AUTH_USER:-}" ]; then PREVIEW_AUTH_USER="dfwreview"; fi
          if [ -z "${PREVIEW_AUTH_PASS:-}" ]; then PREVIEW_AUTH_PASS="dfwpreview2026"; fi

          root_status="$(curl -s -o /dev/null -w '%{http_code}' https://dfwmatchdayconcierge.com/)"
          preview_public_status="$(curl -s -o /dev/null -w '%{http_code}' https://dfwmatchdayconcierge.com/preview/)"
          preview_auth_status="$(curl -s -o /dev/null -w '%{http_code}' -u "$PREVIEW_AUTH_USER:$PREVIEW_AUTH_PASS" https://dfwmatchdayconcierge.com/preview/)"
          connect_auth_status="$(curl -s -o /dev/null -w '%{http_code}' -u "$PREVIEW_AUTH_USER:$PREVIEW_AUTH_PASS" https://dfwmatchdayconcierge.com/preview/connect/)"

          echo "root_status=$root_status"
          echo "preview_public_status=$preview_public_status"
          echo "preview_auth_status=$preview_auth_status"
          echo "connect_auth_status=$connect_auth_status"

          test "$root_status" = "200"
          test "$preview_public_status" = "401"
          test "$preview_auth_status" = "200"
          test "$connect_auth_status" = "200"
