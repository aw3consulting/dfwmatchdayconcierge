name: DreamHost Preview Deploy

on:
  workflow_dispatch:
    inputs:
      confirm_preview_deploy:
        description: "Type DEPLOY_PREVIEW to copy DreamHost staging files into the protected live preview path"
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - .github/workflows/dreamhost-preview-deploy.yml
      - .github/dreamhost-preview-deploy-request.txt
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

env:
  LIVE_ROOT: /home/dfw_webadmin/preview.dfwmatchdayconcierge.com
  STAGING_ROOT: /home/dfw_webadmin/staging.dfwmatchdayconcierge.com
  PREVIEW_PATH: preview
  RESULT_FILE: docs/deployment/dreamhost-preview-deployment-result.json

jobs:
  deploy-preview:
    name: Deploy protected preview path on DreamHost
    runs-on: ubuntu-latest
    environment: dreamhost-preview
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute DreamHost preview deployment
        id: deploy
        shell: bash
        continue-on-error: true
        env:
          DREAMHOST_SSH_HOST: ${{ secrets.DREAMHOST_SSH_HOST }}
          DREAMHOST_SSH_PORT: ${{ secrets.DREAMHOST_SSH_PORT }}
          DREAMHOST_SSH_USER: ${{ secrets.DREAMHOST_SSH_USER }}
          DREAMHOST_SSH_PRIVATE_KEY: ${{ secrets.DREAMHOST_SSH_PRIVATE_KEY }}
          DREAMHOST_KNOWN_HOSTS: ${{ secrets.DREAMHOST_KNOWN_HOSTS }}
          DFW_PREVIEW_BASIC_AUTH_USER: ${{ secrets.DFW_PREVIEW_BASIC_AUTH_USER }}
          DFW_PREVIEW_BASIC_AUTH_PASS: ${{ secrets.DFW_PREVIEW_BASIC_AUTH_PASS }}
        run: |
          set -uo pipefail
          mkdir -p "$(dirname "$RESULT_FILE")"

          write_result() {
            local status="$1"
            local detail="$2"
            python3 - <<PY
import json, os, datetime
payload = {
  "mission": "dfw_dreamhost_preview_deployment_execution_v1_0_0",
  "status": ${status@Q},
  "detail": ${detail@Q},
  "preview_url": "https://dfwmatchdayconcierge.com/preview/",
  "live_root": os.environ.get("LIVE_ROOT"),
  "staging_root": os.environ.get("STAGING_ROOT"),
  "preview_path": os.environ.get("PREVIEW_PATH"),
  "commit": os.environ.get("GITHUB_SHA"),
  "run_id": os.environ.get("GITHUB_RUN_ID"),
  "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
  "event": os.environ.get("GITHUB_EVENT_NAME"),
  "written_at_utc": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z"
}
os.makedirs(os.path.dirname(os.environ["RESULT_FILE"]), exist_ok=True)
with open(os.environ["RESULT_FILE"], "w", encoding="utf-8") as f:
  json.dump(payload, f, indent=2)
  f.write("\n")
PY
          }

          if [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.confirm_preview_deploy }}" != "DEPLOY_PREVIEW" ]; then
              write_result "FAILED" "workflow_dispatch input did not equal DEPLOY_PREVIEW"
              exit 1
            fi
          else
            if [ ! -f .github/dreamhost-preview-deploy-request.txt ]; then
              write_result "FAILED" "missing .github/dreamhost-preview-deploy-request.txt"
              exit 1
            fi
            deploy_request="$(head -n 1 .github/dreamhost-preview-deploy-request.txt | tr -d '\r\n ')"
            if [ "$deploy_request" != "DEPLOY_PREVIEW" ]; then
              write_result "FAILED" "deploy request first line does not contain DEPLOY_PREVIEW"
              exit 1
            fi
          fi

          required=(
            DREAMHOST_SSH_HOST
            DREAMHOST_SSH_PORT
            DREAMHOST_SSH_USER
            DREAMHOST_SSH_PRIVATE_KEY
            DREAMHOST_KNOWN_HOSTS
            DFW_PREVIEW_BASIC_AUTH_USER
            DFW_PREVIEW_BASIC_AUTH_PASS
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              write_result "FAILED" "missing required secret: $key"
              exit 1
            fi
          done

          install -m 700 -d ~/.ssh
          printf '%s\n' "$DREAMHOST_SSH_PRIVATE_KEY" > ~/.ssh/dreamhost_preview_key
          chmod 600 ~/.ssh/dreamhost_preview_key
          printf '%s\n' "$DREAMHOST_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          auth_user_b64="$(printf '%s' "$DFW_PREVIEW_BASIC_AUTH_USER" | base64 -w0)"
          auth_pass_b64="$(printf '%s' "$DFW_PREVIEW_BASIC_AUTH_PASS" | base64 -w0)"

          ssh -i ~/.ssh/dreamhost_preview_key \
            -p "$DREAMHOST_SSH_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$DREAMHOST_SSH_USER@$DREAMHOST_SSH_HOST" \
            "DFW_PREVIEW_BASIC_AUTH_USER_B64='$auth_user_b64' DFW_PREVIEW_BASIC_AUTH_PASS_B64='$auth_pass_b64' LIVE_ROOT='$LIVE_ROOT' STAGING_ROOT='$STAGING_ROOT' PREVIEW_PATH='$PREVIEW_PATH' bash -se" <<'REMOTE_SCRIPT'
set -euo pipefail

DFW_PREVIEW_BASIC_AUTH_USER="$(printf '%s' "$DFW_PREVIEW_BASIC_AUTH_USER_B64" | base64 -d)"
DFW_PREVIEW_BASIC_AUTH_PASS="$(printf '%s' "$DFW_PREVIEW_BASIC_AUTH_PASS_B64" | base64 -d)"
PREVIEW_ROOT="$LIVE_ROOT/$PREVIEW_PATH"
STAMP="$(date +%Y%m%d-%H%M%S)"
HTPASSWD_FILE="$HOME/.htpasswd_dfw_preview"

if [ "$PREVIEW_ROOT" = "$LIVE_ROOT" ] || [ -z "$PREVIEW_PATH" ]; then
  echo "FAIL: unsafe preview path"
  exit 1
fi
case "$LIVE_ROOT" in
  /home/dfw_webadmin/preview.dfwmatchdayconcierge.com) ;;
  *) echo "FAIL: LIVE_ROOT outside governed path: $LIVE_ROOT"; exit 1 ;;
esac
case "$STAGING_ROOT" in
  /home/dfw_webadmin/staging.dfwmatchdayconcierge.com) ;;
  *) echo "FAIL: STAGING_ROOT outside governed path: $STAGING_ROOT"; exit 1 ;;
esac

test -d "$LIVE_ROOT"
test -d "$STAGING_ROOT"
test -f "$STAGING_ROOT/index.html"
test -d "$STAGING_ROOT/assets"
test -f "$STAGING_ROOT/connect/index.html"

if [ -d "$PREVIEW_ROOT" ]; then
  mv "$PREVIEW_ROOT" "$LIVE_ROOT/preview.backup.$STAMP"
fi
mkdir -p "$PREVIEW_ROOT"
rsync -a --delete --exclude ".git" "$STAGING_ROOT"/ "$PREVIEW_ROOT"/

printf "%s:%s\n" "$DFW_PREVIEW_BASIC_AUTH_USER" "$(openssl passwd -apr1 "$DFW_PREVIEW_BASIC_AUTH_PASS")" > "$HTPASSWD_FILE"
chmod 600 "$HTPASSWD_FILE"

cat > "$PREVIEW_ROOT/.htaccess" <<EOF
AuthType Basic
AuthName "DFW Matchday Preview"
AuthUserFile $HTPASSWD_FILE
Require valid-user
Options -Indexes

<IfModule mod_headers.c>
Header set X-Robots-Tag "noindex, nofollow, noarchive"
</IfModule>
EOF

find "$PREVIEW_ROOT" -type f -name "*.html" -exec perl -0pi -e 's#</head>#<meta name="robots" content="noindex,nofollow,noarchive"></head>#i unless /name=["'"'"'']robots["'"'"'']/i' {} \;
find "$PREVIEW_ROOT" -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) -exec perl -0pi -e '
  s#(src|href)=["'"'"'']/(assets/)#$1="/preview/$2#g;
  s#(src|href)=["'"'"'']/(connect/)#$1="/preview/$2#g;
  s#url\((["'"'"'']?)/(assets/)#url($1/preview/$2#g;
' {} +
REMOTE_SCRIPT

          root_status="$(curl -s -o /dev/null -w '%{http_code}' https://dfwmatchdayconcierge.com/)"
          preview_public_status="$(curl -s -o /dev/null -w '%{http_code}' https://dfwmatchdayconcierge.com/preview/)"
          preview_auth_status="$(curl -s -o /dev/null -w '%{http_code}' -u "$DFW_PREVIEW_BASIC_AUTH_USER:$DFW_PREVIEW_BASIC_AUTH_PASS" https://dfwmatchdayconcierge.com/preview/)"
          connect_auth_status="$(curl -s -o /dev/null -w '%{http_code}' -u "$DFW_PREVIEW_BASIC_AUTH_USER:$DFW_PREVIEW_BASIC_AUTH_PASS" https://dfwmatchdayconcierge.com/preview/connect/)"

          if [ "$root_status" != "200" ] || [ "$preview_public_status" != "401" ] || [ "$preview_auth_status" != "200" ] || [ "$connect_auth_status" != "200" ]; then
            write_result "FAILED" "validation failed: root=$root_status preview_public=$preview_public_status preview_auth=$preview_auth_status connect_auth=$connect_auth_status"
            exit 1
          fi

          write_result "DEPLOYED" "validation passed: root=200 preview_public=401 preview_auth=200 connect_auth=200"

      - name: Commit deployment result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f "$RESULT_FILE" ]; then
            mkdir -p "$(dirname "$RESULT_FILE")"
            printf '{\n  "mission": "dfw_dreamhost_preview_deployment_execution_v1_0_0",\n  "status": "FAILED",\n  "detail": "workflow ended before result file was written"\n}\n' > "$RESULT_FILE"
          fi
          git add "$RESULT_FILE"
          git commit -m "Record DreamHost preview deployment result" || true
          git push || true

      - name: Enforce deployment result
        shell: bash
        run: |
          set -euo pipefail
          grep -q '"status": "DEPLOYED"' "$RESULT_FILE"
