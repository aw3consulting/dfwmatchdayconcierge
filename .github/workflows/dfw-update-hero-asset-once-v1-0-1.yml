name: DFW Update Hero Asset Once v1.0.1

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/dfw-update-hero-asset-once-v1-0-1.yml'
      - 'docs/prototypes/pdf-reference-homepage-replica-v1.0.0/assets/images/hero/approved-hero-upload-chunks-v1.0.0/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-hero-asset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Reconstruct approved hero PNG
        shell: bash
        run: |
          set -euo pipefail
          CHUNK_DIR="docs/prototypes/pdf-reference-homepage-replica-v1.0.0/assets/images/hero/approved-hero-upload-chunks-v1.0.0"
          TARGET="docs/prototypes/pdf-reference-homepage-replica-v1.0.0/assets/images/hero/dfw-hero-fw-att-dallas-crowd-flags-v1.0.0.png"
          python3 - <<'PY'
          from pathlib import Path
          import base64, hashlib
          from PIL import Image
          chunk_dir = Path('docs/prototypes/pdf-reference-homepage-replica-v1.0.0/assets/images/hero/approved-hero-upload-chunks-v1.0.0')
          target = Path('docs/prototypes/pdf-reference-homepage-replica-v1.0.0/assets/images/hero/dfw-hero-fw-att-dallas-crowd-flags-v1.0.0.png')
          b64 = ''.join(p.read_text().strip() for p in sorted(chunk_dir.glob('part-*.b64')))
          data = base64.b64decode(b64, validate=True)
          target.write_bytes(data)
          img = Image.open(target)
          sha = hashlib.sha256(data).hexdigest()
          print({'hero_size': img.size, 'sha256': sha, 'bytes': len(data)})
          if img.size != (192, 100):
              raise SystemExit(f'FAIL_UNEXPECTED_SIZE {img.size}')
          if sha != '5c4b80edec7ffa880fe5aabded3e92b75c771720eeedf44b25b75739961a3fc6':
              raise SystemExit('FAIL_SHA_MISMATCH')
          PY

      - name: Commit hero asset only
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/prototypes/pdf-reference-homepage-replica-v1.0.0/assets/images/hero/dfw-hero-fw-att-dallas-crowd-flags-v1.0.0.png
          if git diff --cached --quiet; then
            echo "No hero asset change to commit."
          else
            git commit -m "Update homepage hero asset for browser review"
            git push origin main
          fi
