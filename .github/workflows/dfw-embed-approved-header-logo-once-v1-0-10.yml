name: DFW Embed Approved Header Logo Once v1.0.10

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/dfw-embed-approved-header-logo-once-v1-0-10.yml'
      - 'docs/prototypes/pdf-reference-homepage-replica-v1.0.0/browser-safe-logo-normalization-trigger-v1.0.0.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  embed-approved-header-logo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Pillow for browser-safe approved logo normalization
        shell: bash
        run: python3 -m pip install --quiet pillow

      - name: Replace only the header logo src with browser-safe approved embedded PNG data URI
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          from io import BytesIO
          import re
          from PIL import Image

          target = Path('docs/prototypes/pdf-reference-homepage-replica-v1.0.0/index-v1.0.10-production-readiness-preview-full-original-assets-v1.0.0.html')
          b64_source = Path('docs/prototypes/pdf-reference-homepage-replica-v1.0.0/assets/approved/approved-header-logo-transparent-display-embedded-v1.0.0.base64.txt')
          old_path_src = 'assets/images/logos/dfw-logo-footer-v1.0.0.png'
          required_title = 'DFW Matchday Concierge - Preview Fixed Prototype v1.0.10'
          css_1 = '<link rel="stylesheet" href="assets/css/replica-v1.0.7.css">'
          css_2 = '<link rel="stylesheet" href="assets/css/replica-v1.0.10.css">'

          if not target.exists():
              raise SystemExit(f'MISSING_TARGET {target}')
          if not b64_source.exists():
              raise SystemExit(f'MISSING_APPROVED_HEADER_LOGO_BASE64 {b64_source}')

          html = target.read_text(encoding='utf-8')
          approved_b64 = ''.join(b64_source.read_text(encoding='utf-8').split())
          approved_png = base64.b64decode(approved_b64, validate=True)
          approved_sha = hashlib.sha256(approved_png).hexdigest()
          approved_img = Image.open(BytesIO(approved_png)).convert('RGBA')

          target_w, target_h = 304, 216
          scale = min(target_w / approved_img.width, target_h / approved_img.height)
          resized_size = (round(approved_img.width * scale), round(approved_img.height * scale))
          resized = approved_img.resize(resized_size, Image.Resampling.LANCZOS)
          canvas = Image.new('RGBA', (target_w, target_h), (0, 0, 0, 0))
          canvas.alpha_composite(resized, ((target_w - resized_size[0]) // 2, (target_h - resized_size[1]) // 2))
          out = BytesIO()
          canvas.save(out, format='PNG', optimize=True)
          browser_safe_png = out.getvalue()
          data_uri = 'data:image/png;base64,' + base64.b64encode(browser_safe_png).decode('ascii')

          if html.count(f'<title>{required_title}</title>') != 1:
              raise SystemExit('TITLE_GATE_FAIL')
          if html.count(css_1) != 1 or html.count(css_2) != 1:
              raise SystemExit('CSS_REFERENCE_GATE_FAIL')

          header_match = re.search(r'(<header\b[^>]*class="site-header"[^>]*>)(.*?)(</header>)', html, flags=re.S)
          if not header_match:
              raise SystemExit('HEADER_NOT_FOUND')
          header = header_match.group(2)
          if 'logo-placeholder' in header or '.logo-placeholder' in header:
              raise SystemExit('HEADER_LOGO_PLACEHOLDER_PRESENT')

          required_logo = (
              '<a class="logo-cell" href="#top" aria-label="DFW Matchday Concierge">\n'
              '  <img\n'
              '    class="site-logo approved-header-logo-img"\n'
              f'    src="{data_uri}"\n'
              '    alt="DFW Matchday Concierge"\n'
              '    width="76"\n'
              '    height="54"\n'
              '    decoding="async">\n'
              '</a>'
          )

          anchor_pattern = re.compile(
              r'<a class="logo-cell" href="#top" aria-label="DFW Matchday Concierge">.*?</a>',
              flags=re.S,
          )
          new_header, count = anchor_pattern.subn(required_logo, header, count=1)
          if count != 1:
              raise SystemExit(f'HEADER_REPLACEMENT_COUNT_FAIL {count}')

          html = html[:header_match.start(2)] + new_header + html[header_match.end(2):]
          patched_header = re.search(r'(<header\b[^>]*class="site-header"[^>]*>)(.*?)(</header>)', html, flags=re.S).group(2)
          gates = {
              'header_data_uri_count': patched_header.count('data:image/png;base64,'),
              'header_old_path_count': patched_header.count(old_path_src),
              'header_logo_placeholder_count': patched_header.count('logo-placeholder') + patched_header.count('.logo-placeholder'),
              'title_count': html.count(f'<title>{required_title}</title>'),
              'css_1_count': html.count(css_1),
              'css_2_count': html.count(css_2),
          }
          expected = {
              'header_data_uri_count': 1,
              'header_old_path_count': 0,
              'header_logo_placeholder_count': 0,
              'title_count': 1,
              'css_1_count': 1,
              'css_2_count': 1,
          }
          if gates != expected:
              raise SystemExit(f'SOURCE_GATE_FAIL gates={gates} expected={expected}')

          target.write_text(html, encoding='utf-8')
          print('SOURCE_GATES_PASS')
          print(gates)
          print({'approved_source_sha256': approved_sha, 'browser_safe_png_bytes': len(browser_safe_png), 'browser_safe_canvas': [target_w, target_h]})
          PY

      - name: Commit target file only
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/prototypes/pdf-reference-homepage-replica-v1.0.0/index-v1.0.10-production-readiness-preview-full-original-assets-v1.0.0.html
          if git diff --cached --quiet; then
            echo "No target change to commit."
          else
            git commit -m "Normalize approved embedded header logo for browser render"
            git push origin main
          fi
