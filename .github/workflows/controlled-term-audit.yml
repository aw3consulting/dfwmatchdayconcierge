name: Controlled Term Audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  controlled-term-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run controlled term audit
        run: node scripts/check-controlled-terms.mjs
