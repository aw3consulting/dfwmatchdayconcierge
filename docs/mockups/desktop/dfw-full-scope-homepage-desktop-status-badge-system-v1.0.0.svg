<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900"><title>Homepage desktop status badge system mockup v1.0.0</title><rect width="1440" height="900" fill="#07111f"/><text x="70" y="85" fill="#fff" font-family="Arial" font-size="40" font-weight="800">Homepage Desktop Status Badge System</text><rect x="70" y="150" width="1300" height="610" rx="28" fill="#f8fafc"/><text x="110" y="220" fill="#111827" font-family="Arial" font-size="32" font-weight="800">Every claim has a status boundary</text><g font-family="Arial" font-size="18" font-weight="800"><rect x="110" y="280" width="190" height="52" rx="26" fill="#ecfdf5" stroke="#86efac"/><text x="135" y="313" fill="#047857">Live Capability</text><rect x="330" y="280" width="210" height="52" rx="26" fill="#dbeafe" stroke="#93c5fd"/><text x="355" y="313" fill="#1d4ed8">Operator Assisted</text><rect x="570" y="280" width="160" height="52" rx="26" fill="#fff7ed" stroke="#fdba74"/><text x="595" y="313" fill="#9a3412">Development</text><rect x="760" y="280" width="150" height="52" rx="26" fill="#fef2f2" stroke="#fecaca"/><text x="795" y="313" fill="#991b1b">Restricted</text><rect x="110" y="370" width="230" height="52" rx="26" fill="#dbeafe" stroke="#93c5fd"/><text x="135" y="403" fill="#1d4ed8">Referral / Third Party</text><rect x="370" y="370" width="180" height="52" rx="26" fill="#dbeafe" stroke="#93c5fd"/><text x="395" y="403" fill="#1d4ed8">Information Only</text><rect x="580" y="370" width="170" height="52" rx="26" fill="#dbeafe" stroke="#93c5fd"/><text x="605" y="403" fill="#1d4ed8">Planning Value</text><rect x="780" y="370" width="210" height="52" rx="26" fill="#fff7ed" stroke="#fdba74"/><text x="805" y="403" fill="#9a3412">Sponsored Placement</text><rect x="110" y="460" width="210" height="52" rx="26" fill="#fff7ed" stroke="#fdba74"/><text x="135" y="493" fill="#9a3412">Affiliate / Referral</text><rect x="350" y="460" width="250" height="52" rx="26" fill="#fff7ed" stroke="#fdba74"/><text x="375" y="493" fill="#9a3412">Operator Review Required</text><rect x="630" y="460" width="170" height="52" rx="26" fill="#fff7ed" stroke="#fdba74"/><text x="655" y="493" fill="#9a3412">Quote Required</text><rect x="830" y="460" width="130" height="52" rx="26" fill="#ecfdf5" stroke="#86efac"/><text x="855" y="493" fill="#047857">Confirmed</text></g><text x="110" y="600" fill="#475569" font-family="Arial" font-size="22">Badges prevent unsupported official, sponsor, routing, payment, dispatch, and fulfillment claims.</text></svg>