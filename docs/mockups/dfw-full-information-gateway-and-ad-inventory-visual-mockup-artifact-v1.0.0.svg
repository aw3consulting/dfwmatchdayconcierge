    <rect x="650" y="520" width="500" height="250" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="685" y="580" font-size="28" font-weight="800" fill="#0f172a">5. Route + Area Guide</text>
    <rect x="685" y="625" width="190" height="70" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
