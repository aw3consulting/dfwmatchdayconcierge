    <text x="115" y="1625" font-size="18" fill="#cbd5e1">Review the mockup package before opening any frontend implementation lane.</text>
    <text x="115" y="1670" font-size="18" fill="#cbd5e1">Production deployment and final QR activation require separate approval.</text>
