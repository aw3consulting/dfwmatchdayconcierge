<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2200" viewBox="0 0 1800 2200" role="img" aria-labelledby="title desc">
  <title id="title">DFW Gateway Mockup Review Board v1.0.0</title>
  <desc id="desc">Compact schematic review board for the DFW public information gateway, partner surfaces, fan hub modules, and inventory controls.</desc>
  <rect width="1800" height="2200" fill="#07111f"/>
  <text x="80" y="90" font-family="Arial" font-size="48" font-weight="800" fill="#ffffff">DFW Matchday Information + Planning Hub</text>
  <text x="80" y="135" font-family="Arial" font-size="22" fill="#cbd5e1">Compact schematic board · review surface</text>
  <g font-family="Arial">
    <rect x="80" y="200" width="500" height="250" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
