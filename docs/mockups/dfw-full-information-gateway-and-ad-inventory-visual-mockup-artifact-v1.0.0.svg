    <text x="115" y="1220" font-size="28" font-weight="800" fill="#0f172a">10. Internal Inventory Control</text>
    <text x="115" y="1275" font-size="18" fill="#475569">Placement status · date range · disclosure status · review status · location controls</text>
    <rect x="115" y="1320" width="310" height="54" rx="14" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
