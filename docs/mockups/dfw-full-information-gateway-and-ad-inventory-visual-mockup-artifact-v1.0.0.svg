    <rect x="1220" y="200" width="500" height="250" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1255" y="260" font-size="28" font-weight="800" fill="#0f172a">3. Public Guide Grid</text>
    <rect x="1255" y="305" width="120" height="60" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1280" y="342" font-size="16" fill="#475569">Airport</text>
    <rect x="1400" y="305" width="120" height="60" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1425" y="342" font-size="16" fill="#475569">Stadium</text>
    <rect x="1545" y="305" width="120" height="60" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
