    <text x="115" y="955" font-size="18" fill="#475569">Inventory, audiences, inquiry fields</text>

    <rect x="650" y="840" width="500" height="250" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="685" y="900" font-size="28" font-weight="800" fill="#0f172a">8. Coordinator Page</text>
    <text x="685" y="955" font-size="18" fill="#475569">Group planning and quote-ready intake</text>

    <rect x="1220" y="840" width="500" height="250" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1255" y="900" font-size="28" font-weight="800" fill="#0f172a">9. Mobile Stack</text>
    <rect x="1410" y="930" width="150" height="90" rx="16" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <text x="1430" y="982" font-size="18" fill="#cbd5e1">Mobile</text>

