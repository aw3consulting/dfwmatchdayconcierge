<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DFW Matchday Concierge - v1.0.10 Header Logo Visible Preview</title>
<meta name="description" content="Controlled v1.0.10 homepage preview using one CDN base path for raster assets." />
<style>
html,body{margin:0;min-height:100%;background:#000;color:#f4f7f2;font-family:Arial,Helvetica,sans-serif}.boot{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;color:#f0c86b;background:#020b13}.boot b{display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}.boot small{color:#c7d5dc}
</style>
</head>
<body>
<div class="boot"><div><b>Loading v1.0.10 header logo preview</b><small>Controlled raster logo visibility pass</small></div></div>
<script>
(function(){
  var version = String(Date.now());
  var assetRoot = 'https://cdn.jsdelivr.net/gh/aw3consulting/dfwmatchdayconcierge@main/docs/prototypes/pdf-reference-homepage-replica-v1.0.0/';
  var homepage = assetRoot + 'index-v1.0.10.html?v=' + version;
  fetch(homepage, {cache:'no-store'})
    .then(function(response){
      if(!response.ok){ throw new Error('Unable to load v1.0.10 homepage: HTTP ' + response.status); }
      return response.text();
    })
    .then(function(html){
      html = html.replace(/<base[^>]*>/ig, '');
      html = html.replace('<head>', '<head><base href="' + assetRoot + '">');
      document.open();
      document.write(html);
      document.close();
    })
    .catch(function(error){
      document.body.innerHTML = '<div class="boot"><div><b>Preview load failed</b><small>' + String(error.message || error) + '</small></div></div>';
      console.error(error);
    });
})();
</script>
</body>
</html>
