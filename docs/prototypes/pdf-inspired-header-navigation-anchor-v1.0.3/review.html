<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DFW Header Navigation Logo-Bound Preview</title>
  <style>
    :root {
      --pdf-header-0: #000712;
      --pdf-header-1: #03101e;
      --pdf-header-2: #1c2c3e;
      --pdf-gold: #be9248;
      --pdf-gold-light: #d7ad52;
      --pdf-text: #f5f2ec;
      --pdf-muted: #d7d5d0;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-width: 320px;
      background: var(--pdf-header-0);
      color: var(--pdf-text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .pdf-header-preview {
      width: 100%;
      min-height: 72px;
      background:
        linear-gradient(90deg, rgba(0, 7, 18, 0.98) 0%, rgba(3, 16, 30, 0.97) 45%, rgba(28, 44, 62, 0.72) 100%),
        var(--pdf-header-1);
      border-bottom: 1px solid rgba(190, 146, 72, 0.34);
    }

    .pdf-header-inner {
      display: grid;
      grid-template-columns: auto auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 18px;
      width: min(100%, 1120px);
      margin: 0 auto;
      min-height: 72px;
      padding: 7px 34px;
    }

    .dfw-mark {
      display: block;
      width: 62px;
      height: auto;
    }

    .brand-lockup {
      color: var(--pdf-text);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: 0.075em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .nav-labels {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 1.15vw, 17px);
      min-width: 0;
    }

    .nav-labels span {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      color: var(--pdf-muted);
      font-size: clamp(8px, 0.72vw, 10px);
      font-weight: 800;
      letter-spacing: 0.11em;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .header-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 18px;
      border: 1px solid var(--pdf-gold-light);
      border-radius: 4px;
      color: var(--pdf-gold-light);
      background: rgba(0, 7, 18, 0.68);
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.1em;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @media (max-width: 980px) {
      .pdf-header-inner {
        grid-template-columns: auto auto auto;
      }

      .nav-labels {
        grid-column: 1 / -1;
        justify-content: flex-start;
        overflow: hidden;
      }
    }

    @media (max-width: 640px) {
      .pdf-header-inner {
        grid-template-columns: auto 1fr;
        gap: 10px 14px;
        padding: 10px 14px;
      }

      .dfw-mark { width: 52px; }

      .brand-lockup { font-size: 12px; }

      .nav-labels,
      .header-button {
        grid-column: 1 / -1;
      }

      .nav-labels {
        justify-content: flex-start;
        gap: 12px;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .nav-labels::-webkit-scrollbar { display: none; }

      .header-button { width: 100%; }
    }
  </style>
</head>
